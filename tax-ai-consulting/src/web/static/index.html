<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부동산 세금 상담 — 시나리오 계산</title>
<style>
  :root {
    --navy: #1a5276; --navy-d: #123a54; --bg: #f4f6f8; --line: #d5dbe0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    margin: 0; background: var(--bg); color: #1f2d3a;
  }
  header { background: var(--navy); color: #fff; padding: 14px 24px; }
  header h1 { margin: 0; font-size: 19px; }
  header p { margin: 4px 0 0; font-size: 12.5px; opacity: .85; }
  .wrap { display: flex; gap: 18px; padding: 18px 24px; align-items: flex-start; }
  .panel {
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  #formPanel { width: 400px; flex-shrink: 0; }
  #reportPanel { flex: 1; min-width: 0; min-height: 640px; display: flex; flex-direction: column; }
  label { display: block; font-size: 12px; color: #47606f; margin: 10px 0 3px; font-weight: 700; }
  select, input {
    width: 100%; padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13.5px; font-family: inherit;
  }
  input:focus, select:focus { outline: 2px solid #7fb3d5; border-color: var(--navy); }
  .money-hint { font-size: 11.5px; color: #2874a6; margin-top: 2px; min-height: 14px; }
  .person-row { display: flex; gap: 8px; }
  .person-row > div { flex: 1; }
  .person-row .sub { font-size: 10.5px; color: #7b8a97; font-weight: 400; }
  .btns { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  button {
    padding: 10px 14px; border: none; border-radius: 7px; cursor: pointer;
    font-size: 13.5px; font-weight: 700; font-family: inherit;
  }
  #runBtn { background: var(--navy); color: #fff; flex: 1; }
  #runBtn:hover { background: var(--navy-d); }
  .export { background: #eaf2f8; color: var(--navy); border: 1px solid #aed6f1; }
  .export:hover { background: #d4e6f1; }
  .export:disabled { opacity: .45; cursor: not-allowed; }
  .ai-note { font-size: 11px; color: #78909c; margin-top: 10px; line-height: 1.6;
    background: #f8f9fa; border: 1px solid #eceff1; border-radius: 6px; padding: 8px 10px; }
  .ai-note code { background: #eceff1; padding: 1px 4px; border-radius: 3px; }
  #status { font-size: 12.5px; margin-top: 10px; color: #7d6608; min-height: 16px; }
  #status.err { color: #b03a2e; }
  iframe { width: 100%; flex: 1; border: 1px solid var(--line); border-radius: 6px; background: #fff; min-height: 600px; }
  .placeholder { color: #90a4ae; font-size: 14px; text-align: center; margin-top: 220px; }
  @media (max-width: 900px) { .wrap { flex-direction: column; } #formPanel { width: 100%; } }
</style>
</head>
<body>
<header>
  <h1>부동산 세금 상담 — 시나리오 계산</h1>
  <p>입력값을 넣고 [보고서 생성]을 누르면 증여세·양도세·취득세·보유세 비교 보고서가 즉시 만들어집니다.
     계산은 이 브라우저 안에서만 수행되며 입력값이 어디에도 전송되지 않습니다. (세법 기준 2026.5.10 시행분)</p>
</header>

<div class="wrap">
  <div class="panel" id="formPanel">
    <label for="scenario">상담 시나리오</label>
    <select id="scenario"></select>
    <div id="fields"></div>
    <div class="btns">
      <button id="runBtn">보고서 생성</button>
      <button class="export" id="docBtn" disabled>Word 저장(.doc)</button>
      <button class="export" id="printBtn" disabled>인쇄 / PDF</button>
    </div>
    <div class="ai-note">
      AI 정밀 보고서·심화 검토(리스크·대안)와 정식 .docx/서버 PDF는
      로컬 서버 버전에서 제공됩니다: 저장소를 내려받아
      <code>cd tax-ai-consulting &amp;&amp; ANTHROPIC_API_KEY=... npm run web</code>
    </div>
    <div id="status"></div>
  </div>

  <div class="panel" id="reportPanel">
    <div class="placeholder" id="placeholder">왼쪽에서 입력값을 넣고 「보고서 생성」을 누르세요.</div>
    <iframe id="report" style="display:none" title="보고서"></iframe>
  </div>
</div>

<script src="bundle.js"></script>
</body>
</html>
