<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>부동산 세금 상담 — 시나리오 계산</title>
<style>
  :root {
    --navy: #1a5276; --navy-d: #123a54; --bg: #f4f6f8; --line: #d5dbe0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    margin: 0; background: var(--bg); color: #1f2d3a;
  }
  header {
    background: var(--navy); color: #fff; padding: 14px 24px;
  }
  header h1 { margin: 0; font-size: 19px; }
  header p { margin: 4px 0 0; font-size: 12.5px; opacity: .85; }
  .wrap { display: flex; gap: 18px; padding: 18px 24px; align-items: flex-start; }
  .panel {
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  #formPanel { width: 400px; flex-shrink: 0; }
  #reportPanel { flex: 1; min-width: 0; min-height: 640px; display: flex; flex-direction: column; }
  label { display: block; font-size: 12px; color: #47606f; margin: 10px 0 3px; font-weight: 700; }
  select, input {
    width: 100%; padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 13.5px; font-family: inherit;
  }
  input:focus, select:focus { outline: 2px solid #7fb3d5; border-color: var(--navy); }
  .money-hint { font-size: 11.5px; color: #2874a6; margin-top: 2px; min-height: 14px; }
  .person-row { display: flex; gap: 8px; }
  .person-row > div { flex: 1; }
  .person-row .sub { font-size: 10.5px; color: #7b8a97; font-weight: 400; }
  .btns { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
  button {
    padding: 10px 14px; border: none; border-radius: 7px; cursor: pointer;
    font-size: 13.5px; font-weight: 700; font-family: inherit;
  }
  #runBtn { background: var(--navy); color: #fff; flex: 1; }
  #runBtn:hover { background: var(--navy-d); }
  .export { background: #eaf2f8; color: var(--navy); border: 1px solid #aed6f1; }
  .export:hover { background: #d4e6f1; }
  .export:disabled { opacity: .45; cursor: not-allowed; }
  .ai-btns { margin-top: 8px; }
  .ai { background: #145a32; color: #fff; flex: 1; }
  .ai:hover { background: #0e4023; }
  .ai:disabled { opacity: .55; cursor: wait; }
  .ai-note { font-size: 11px; color: #78909c; margin-top: 6px; line-height: 1.5; }
  .ai-note code { background: #eceff1; padding: 1px 4px; border-radius: 3px; }
  #status { font-size: 12.5px; margin-top: 10px; color: #7d6608; min-height: 16px; }
  #status.err { color: #b03a2e; }
  iframe { width: 100%; flex: 1; border: 1px solid var(--line); border-radius: 6px; background: #fff; min-height: 600px; }
  .placeholder { color: #90a4ae; font-size: 14px; text-align: center; margin-top: 220px; }
  @media (max-width: 900px) { .wrap { flex-direction: column; } #formPanel { width: 100%; } }
</style>
</head>
<body>
<header>
  <h1>부동산 세금 상담 — 시나리오 계산</h1>
  <p>입력값을 넣고 [보고서 생성]을 누르면 증여세·양도세·취득세·보유세 비교 보고서가 즉시 만들어집니다. (세법 기준 2026.5.10 시행분)</p>
</header>

<div class="wrap">
  <div class="panel" id="formPanel">
    <label for="scenario">상담 시나리오</label>
    <select id="scenario"></select>
    <div id="fields"></div>
    <div class="btns">
      <button id="runBtn">보고서 생성</button>
      <button class="export" id="docxBtn" disabled>Word 저장</button>
      <button class="export" id="pdfBtn" disabled>PDF 저장</button>
      <button class="export" id="printBtn" disabled>인쇄</button>
    </div>
    <div class="btns ai-btns">
      <button class="ai" id="aiReportBtn">AI 정밀 보고서</button>
      <button class="ai" id="advisoryBtn">심화 검토 (리스크·대안)</button>
    </div>
    <div class="ai-note">AI 버튼은 최신 세법 웹검색·리스크 분석을 수행하므로 2~5분 걸립니다.
      서버에 <code>ANTHROPIC_API_KEY</code>가 설정되어 있어야 합니다.</div>
    <div id="status"></div>
  </div>

  <div class="panel" id="reportPanel">
    <div class="placeholder" id="placeholder">왼쪽에서 입력값을 넣고 「보고서 생성」을 누르세요.</div>
    <iframe id="report" style="display:none" title="보고서"></iframe>
  </div>
</div>

<script>
let SCENARIOS = [];
const $ = (id) => document.getElementById(id);
const fmt = (n) => Number(n).toLocaleString('ko-KR');

const KOREAN_UNIT = (n) => {
  n = Number(n);
  if (!isFinite(n) || n === 0) return '';
  const eok = Math.floor(n / 100000000);
  const man = Math.round((n % 100000000) / 10000);
  let s = '';
  if (eok) s += eok.toLocaleString('ko-KR') + '억';
  if (man) s += (s ? ' ' : '') + man.toLocaleString('ko-KR') + '만';
  return s ? s + '원' : n.toLocaleString('ko-KR') + '원';
};

function fieldHtml(f) {
  if (f.type === 'select') {
    const opts = f.options.map((o) =>
      `<option value="${o.value}" ${o.value === f.default ? 'selected' : ''}>${o.label}</option>`).join('');
    return `<label>${f.label}</label><select data-name="${f.name}" data-type="select">${opts}</select>`;
  }
  if (f.type === 'person') {
    return `<label>${f.label}</label>
      <div class="person-row">
        <div><input data-name="${f.name}" data-type="person-price" data-kind="money" value="${fmt(f.default.price)}">
          <div class="sub">가액(원)</div><div class="money-hint"></div></div>
        <div><input data-name="${f.name}" data-type="person-age" value="${f.default.age}">
          <div class="sub">나이(만)</div></div>
      </div>`;
  }
  if (f.type === 'rate') {
    return `<label>${f.label}</label>
      <input data-name="${f.name}" data-type="rate" value="${Math.round(f.default * 100)}">`;
  }
  const isMoney = f.type === 'money';
  return `<label>${f.label}</label>
    <input data-name="${f.name}" data-type="${f.type}" ${isMoney ? 'data-kind="money"' : ''}
           value="${isMoney ? fmt(f.default) : f.default}">
    ${isMoney ? '<div class="money-hint"></div>' : ''}`;
}

function renderForm() {
  const sc = SCENARIOS.find((s) => s.id === Number($('scenario').value));
  $('fields').innerHTML = sc.fields.map(fieldHtml).join('');
  // 금액 필드: 콤마 표시 + 억/만 힌트
  document.querySelectorAll('[data-kind="money"]').forEach((inp) => {
    const hint = inp.nextElementSibling?.classList?.contains('money-hint')
      ? inp.nextElementSibling
      : inp.parentElement.querySelector('.money-hint');
    const update = () => {
      const raw = inp.value.replace(/[^\d]/g, '');
      inp.value = raw ? fmt(raw) : '';
      if (hint) hint.textContent = raw ? KOREAN_UNIT(raw) : '';
    };
    inp.addEventListener('input', update);
    update();
  });
}

function collectInputs() {
  const inputs = {};
  document.querySelectorAll('#fields [data-name]').forEach((el) => {
    const name = el.dataset.name;
    const type = el.dataset.type;
    const numeric = (v) => Number(String(v).replace(/[^\d.-]/g, '')) || 0;
    if (type === 'person-price') {
      inputs[name] = inputs[name] || {};
      inputs[name].price = numeric(el.value);
    } else if (type === 'person-age') {
      inputs[name] = inputs[name] || {};
      inputs[name].age = numeric(el.value);
    } else if (type === 'rate') {
      inputs[name] = numeric(el.value) / 100;
    } else if (type === 'select') {
      inputs[name] = Number(el.value);
    } else {
      inputs[name] = numeric(el.value);
    }
  });
  return { scenarioId: Number($('scenario').value), inputs };
}

function setStatus(msg, isErr = false) {
  $('status').textContent = msg;
  $('status').className = isErr ? 'err' : '';
}

// 현재 표시 중인 문서의 내보내기 대상: null = 기본 보고서, 문자열 = AI 작업 ID
let exportJobId = null;
let pollTimer = null;

function showHtml(html) {
  $('placeholder').style.display = 'none';
  const frame = $('report');
  frame.style.display = 'block';
  frame.srcdoc = html;
  ['docxBtn', 'pdfBtn', 'printBtn'].forEach((id) => { $(id).disabled = false; });
}

function setAiBusy(busy) {
  ['aiReportBtn', 'advisoryBtn', 'runBtn'].forEach((id) => { $(id).disabled = busy; });
}

async function generate() {
  setStatus('계산 중…');
  try {
    const res = await fetch('/api/report', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(collectInputs()),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    exportJobId = null;
    showHtml(data.html);
    setStatus('보고서가 생성되었습니다.');
  } catch (e) {
    setStatus('오류: ' + e.message, true);
  }
}

async function runAiJob(kind, label) {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  setAiBusy(true);
  setStatus(label + ' 요청 중…');
  try {
    const res = await fetch('/api/jobs', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kind, ...collectInputs() }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || res.statusText);
    const jobId = data.jobId;

    pollTimer = setInterval(async () => {
      try {
        const r = await fetch('/api/jobs/' + jobId);
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        const min = Math.floor(j.elapsedSec / 60), sec = j.elapsedSec % 60;
        if (j.status === 'running') {
          setStatus(label + ' — ' + j.progress + ' (경과 ' + min + '분 ' + sec + '초)');
          return;
        }
        clearInterval(pollTimer); pollTimer = null;
        setAiBusy(false);
        if (j.status === 'done') {
          exportJobId = jobId;
          showHtml(j.html);
          setStatus(label + ' 완료 (' + min + '분 ' + sec + '초). Word/PDF 저장 버튼은 이 문서를 저장합니다.');
        } else {
          setStatus(j.error || label + ' 실패', true);
        }
      } catch (e) {
        clearInterval(pollTimer); pollTimer = null;
        setAiBusy(false);
        setStatus('오류: ' + e.message, true);
      }
    }, 3000);
  } catch (e) {
    setAiBusy(false);
    setStatus('오류: ' + e.message, true);
  }
}

async function download(kind) {
  setStatus(kind.toUpperCase() + ' 변환 중…');
  try {
    const res = exportJobId
      ? await fetch('/api/jobs/' + exportJobId + '/export/' + kind)
      : await fetch('/export/' + kind, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(collectInputs()),
        });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || res.statusText);
    }
    const blob = await res.blob();
    const cd = res.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename\*=UTF-8''([^;]+)/);
    const name = m ? decodeURIComponent(m[1]) : 'report.' + kind;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    URL.revokeObjectURL(a.href);
    setStatus(name + ' 저장 완료.');
  } catch (e) {
    setStatus('오류: ' + e.message, true);
  }
}

$('runBtn').addEventListener('click', generate);
$('aiReportBtn').addEventListener('click', () => runAiJob('verified-report', 'AI 정밀 보고서'));
$('advisoryBtn').addEventListener('click', () => runAiJob('advisory', '심화 검토'));
$('docxBtn').addEventListener('click', () => download('docx'));
$('pdfBtn').addEventListener('click', () => download('pdf'));
$('printBtn').addEventListener('click', () => {
  const frame = $('report');
  frame.contentWindow.focus();
  frame.contentWindow.print();
});
$('scenario').addEventListener('change', renderForm);

(async function init() {
  const res = await fetch('/api/scenarios');
  SCENARIOS = await res.json();
  $('scenario').innerHTML = SCENARIOS
    .map((s) => `<option value="${s.id}">${s.id}. ${s.title}</option>`).join('');
  renderForm();
})();
</script>
</body>
</html>
